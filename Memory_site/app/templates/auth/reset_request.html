{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<form class="form" method="POST">
    <h1>Reset Password</h1>
    <p style="color: #888; text-align: center; margin-bottom: 20px; font-size: 0.9em;">
        Enter your email address
    </p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-messages" style="margin-bottom: 20px;">
          {% for message in messages %}
            <div class="alert" style="color: #ff4d4d; background: rgba(255, 77, 77, 0.1); padding: 10px; border-radius: 4px; border: 1px solid #ff4d4d; font-size: 0.9em; text-align: center;">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <div class="control">
        <div class="block-cube block-input">
            <input name="email" placeholder="Email Address" type="email" required>
            <div class="bg-top"><div class="bg-inner"></div></div>
            <div class="bg-right"><div class="bg-inner"></div></div>
            <div class="bg"><div class="bg-inner"></div></div>
        </div>
    </div>

    <button class="btn block-cube block-cube-hover" type="submit">
        <div class="bg-top"><div class="bg-inner"></div></div>
        <div class="bg-right"><div class="bg-inner"></div></div>
        <div class="bg"><div class="bg-inner"></div></div>
        <div class="text">Send Reset Link</div>
    </button>
</form>
{% endblock %}
