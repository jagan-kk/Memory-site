{% extends "base.html" %}

{% block title %}New Password{% endblock %}

{% block content %}
<form class="form" method="POST">
    <h1>New Password</h1>
    
    <div class="control">
        <div class="block-cube block-input">
            <input name="password" placeholder="Enter New Password" type="password" required>
            <div class="bg-top"><div class="bg-inner"></div></div>
            <div class="bg-right"><div class="bg-inner"></div></div>
            <div class="bg"><div class="bg-inner"></div></div>
        </div>
    </div>

    <button class="btn block-cube block-cube-hover" type="submit">
        <div class="bg-top"><div class="bg-inner"></div></div>
        <div class="bg-right"><div class="bg-inner"></div></div>
        <div class="bg"><div class="bg-inner"></div></div>
        <div class="text">Update Password</div>
    </button>
</form>
{% endblock %}
