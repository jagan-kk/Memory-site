{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<form class="form" method="POST" action="{{ url_for('auth.login') }}">
    <h1>Admin Login</h1>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-messages" style="margin-bottom: 20px;">
          {% for message in messages %}
            <div class="alert alert-error" style="color: #ff4d4d; background: rgba(255, 77, 77, 0.1); padding: 10px; border-radius: 4px; border: 1px solid #ff4d4d; font-size: 0.9em; text-align: center;">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <div class="control">
        <div class="block-cube block-input">
            <input name="username" placeholder="Username" type="text" required>
            <div class="bg-top">
                <div class="bg-inner"></div>
            </div>
            <div class="bg-right">
                <div class="bg-inner"></div>
            </div>
            <div class="bg">
                <div class="bg-inner"></div>
            </div>
        </div>
    </div>
    
    <div class="control">
        <div class="block-cube block-input">
            <input name="password" placeholder="Password" type="password" required>
            <div class="bg-top">
                <div class="bg-inner"></div>
            </div>
            <div class="bg-right">
                <div class="bg-inner"></div>
            </div>
            <div class="bg">
                <div class="bg-inner"></div>
            </div>
        </div>
    </div>

    <button class="btn block-cube block-cube-hover" type="submit">
        <div class="bg-top">
            <div class="bg-inner"></div>
        </div>
        <div class="bg-right">
            <div class="bg-inner"></div>
        </div>
        <div class="bg">
            <div class="bg-inner"></div>
        </div>
        <div class="text">
            Log In
        </div>
    </button>

    <div style="text-align: center; margin-top: 20px;">
        <a href="{{ url_for('auth.reset_request') }}" style="color: #888; text-decoration: none; font-size: 0.85em; transition: color 0.3s;">
            Forgot Password?
        </a>
    </div>
</form>

<style>
    /* Subtle hover effect for the link to match your UI */
    form a:hover {
        color: #fff !important;
        text-shadow: 0 0 5px rgba(255,255,255,0.5);
    }
</style>
{% endblock %}
